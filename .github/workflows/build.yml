name: Build Zygisk Module

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK r27
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          echo "NDK=$PWD/android-ndk-r27c" >> $GITHUB_ENV

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target screenoff-anim -j$(nproc)

      - name: Prepare module
        run: |
          mkdir -p module/zygisk
          cp build/libscreenoff-anim.so module/zygisk/arm64-v8a.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenoff-anim-ksu
          path: module/