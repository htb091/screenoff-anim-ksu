name: Build Zygisk Module

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone Dobby
        run: git clone --depth 1 https://github.com/jmpews/Dobby.git external/Dobby

      - name: Fix Dobby arm64 asm
        run: |
          for f in external/Dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm \
                   external/Dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_trampoline_arm64.asm; do
            echo "=== Before: lines with common_closure ==="
            grep -n 'common_closure' $f || true
            # Replace ADRP+ADD pair with LDR
            sed -i '/adrp.*common_closure_bridge_handler@PAGE/,+1{ s/adrp.*/ldr x17, =common_closure_bridge_handler/; /add.*common_closure_bridge_handler@PAGEOFF/d; }' $f
            sed -i '/adrp.*common_closure_bridge_handler@PAGE/,+1{ s/adrp.*/ldr x16, =common_closure_bridge_handler/; /add.*common_closure_bridge_handler@PAGEOFF/d; }' $f
            echo "=== After ==="
            grep -n 'common_closure' $f || true
          done

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r28-linux.zip
          unzip -q android-ndk-r28-linux.zip
          echo "NDK=$PWD/android-ndk-r28" >> $GITHUB_ENV

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE="$NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target screenoff-anim -j$(nproc)

      - name: Prepare module
        run: |
          mkdir -p module/zygisk
          cp build/libscreenoff-anim.so module/zygisk/arm64-v8a.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenoff-anim-ksu
          path: module/